{% extends "base.html" %}
{% block content %}
<article class="bg-white p-5 rounded shadow-sm">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="display-5 fw-bold">{{ post.title }}</h1>
        {% if post.author == current_user or current_user.is_admin %}
            <div>
                <a class="btn btn-secondary btn-sm" href="{{ url_for('main.update_post', post_id=post.id) }}">Edit</a>
                <button type="button" class="btn btn-danger btn-sm" data-bs-toggle="modal" data-bs-target="#deleteModal">Delete</button>
            </div>
        {% endif %}
    </div>
    <p class="text-muted border-bottom pb-3">By <strong>{{ post.author.username }}</strong> on {{ post.date_posted.strftime('%B %d, %Y') }}</p>
    <div class="mt-4 lead" style="white-space: pre-wrap;">{{ post.content }}</div>
</article>


<div class="modal fade" id="deleteModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Delete Post?</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
        <form action="{{ url_for('main.delete_post', post_id=post.id) }}" method="POST">
            <input class="btn btn-danger" type="submit" value="Delete">
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
