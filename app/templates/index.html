{% extends "base.html" %}
{% block content %}
    <h1 class="mb-4">Recent Stories</h1>
    {% for post in posts %}
        <article class="card shadow-sm mb-4">
            <div class="card-body">
                <h2 class="card-title"><a href="{{ url_for('main.post', post_id=post.id) }}" class="text-decoration-none text-dark">{{ post.title }}</a></h2>
                <p class="text-muted small">By {{ post.author.username }} on {{ post.date_posted.strftime('%Y-%m-%d') }}</p>
                <p class="card-text">{{ post.content[:200] }}...</p>
                <a href="{{ url_for('main.post', post_id=post.id) }}" class="btn btn-outline-primary btn-sm">Read More</a>
            </div>
        </article>
    {% endfor %}
{% endblock %}
